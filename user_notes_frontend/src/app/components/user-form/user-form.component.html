<div class="form-container">
  <div class="form-header">
    <h2>{{ isEditMode ? 'Edit User' : 'Create New User' }}</h2>
  </div>

  <div *ngIf="loading" class="alert alert-info">Loading user details...</div>

  <div *ngIf="error && !loading" class="alert alert-danger">{{ error }}</div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="!loading" class="form">
    <div class="form-group">
      <label for="name" class="form-label">Name <span class="required">*</span></label>
      <input
        type="text"
        id="name"
        formControlName="name"
        class="form-control"
        placeholder="Enter user name"
      />
      <div *ngIf="nameError" class="error-message">{{ nameError }}</div>
    </div>

    <div class="form-group">
      <label for="email" class="form-label">Email <span class="required">*</span></label>
      <input
        type="email"
        id="email"
        formControlName="email"
        class="form-control"
        placeholder="Enter email address"
      />
      <div *ngIf="emailError" class="error-message">{{ emailError }}</div>
    </div>

    <div class="form-group">
      <label for="note" class="form-label">Note</label>
      <textarea
        id="note"
        formControlName="note"
        class="form-control"
        rows="4"
        placeholder="Enter any notes about the user"
      ></textarea>
    </div>

    <div class="form-actions">
      <button
        type="submit"
        [disabled]="form.invalid || submitting"
        class="btn btn-primary"
      >
        {{ submitting ? 'Saving...' : (isEditMode ? 'Update User' : 'Create User') }}
      </button>
      <a routerLink="/users" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
