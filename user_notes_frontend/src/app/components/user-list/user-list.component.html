<div class="container">
  <div class="header">
    <h1>User Manager</h1>
    <a routerLink="/users/create" class="btn btn-primary">+ Create New User</a>
  </div>

  <div *ngIf="loading" class="alert alert-info">Loading users...</div>

  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <div *ngIf="!loading && users.length === 0 && !error" class="alert alert-warning">
    No users found. <a routerLink="/users/create">Create your first user</a>
  </div>

  <div *ngIf="!loading && users.length > 0" class="users-table-container">
    <table class="table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Note</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of users">
          <td>{{ user.name }}</td>
          <td>{{ user.email }}</td>
          <td>{{ user.note || '—' }}</td>
          <td class="actions">
            <a [routerLink]="['/users', user.id, 'edit']" class="btn btn-sm btn-info">Edit</a>
            <button (click)="deleteUser(user.id)" class="btn btn-sm btn-danger">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
